name: KB Daily Compile

on:
  schedule:
    # Run daily at 6 AM ET (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      compile:
        description: 'Run AI compilation after fetch (uses ~$0.30 API credits)'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tsx
        run: npm install -g tsx

      - name: Fetch ESPN data
        run: npx tsx scripts/fetch-espn.ts --type all

      - name: Fetch RSS feeds
        run: npx tsx scripts/fetch-rss.ts

      - name: Fetch YouTube channels
        run: npx tsx scripts/fetch-youtube.ts

      - name: Compile Fan Pulse
        run: npx tsx scripts/compile-fan-pulse.ts

      - name: Fetch approved submissions
        run: npx tsx scripts/fetch-submissions.ts

      - name: Install Claude Code
        if: ${{ github.event.inputs.compile != 'false' }}
        run: npm install -g @anthropic-ai/claude-code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Compile KB (Sonnet — ~$0.30 per run)
        if: ${{ github.event.inputs.compile != 'false' }}
        run: |
          claude --model claude-sonnet-4-6 --print "Read the file kb/templates/compile-prompt.md and follow its instructions. Also read kb/templates/verification-checklist.md and verify accuracy. Read all new files in kb/raw/ (files dated today or not yet referenced in any wiki article's sources), then update the relevant wiki articles. Include both first-round and second-round picks in all trade articles. Update kb/CHANGELOG.md and kb/wiki/INDEX.md."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "BKGrit KB Bot"
          git config user.email "kb-bot@bkgrit.com"
          git add kb/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "KB auto-update: $(date +%Y-%m-%d)

          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            git push
          fi

name: KB Daily Compile

on:
  schedule:
    # Run daily at 6 AM ET (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      compile:
        description: 'Run AI compilation after fetch (uses ~$0.30 API credits)'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install tsx
        run: npm install -g tsx

      - name: Fetch ESPN data
        run: npx tsx scripts/fetch-espn.ts --type all

      - name: Fetch RSS feeds
        run: npx tsx scripts/fetch-rss.ts

      - name: Fetch YouTube channels
        run: npx tsx scripts/fetch-youtube.ts

      - name: Compile Fan Pulse
        run: npx tsx scripts/compile-fan-pulse.ts

      - name: Fetch approved submissions
        run: npx tsx scripts/fetch-submissions.ts

      - name: Install Claude Code
        if: ${{ github.event.inputs.compile != 'false' }}
        run: npm install -g @anthropic-ai/claude-code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Compile KB (Sonnet — ~$0.30 per run)
        if: ${{ github.event.inputs.compile != 'false' }}
        run: |
          claude --model claude-haiku-4-5-20251001 --dangerously-skip-permissions --print "You are updating the BKGrit Nets Wiki. ONLY read files in kb/raw/ dated today ($(date +%Y-%m-%d)). For each new raw file, determine which wiki article in kb/wiki/ it relates to and make minimal, targeted updates — add new facts, update stats, adjust confidence levels. Do NOT rewrite entire articles. Do NOT read old raw files. Create new player articles only if a raw source specifically profiles a player not yet in the wiki. Update kb/CHANGELOG.md with today's changes and kb/wiki/INDEX.md if articles were added. Be concise and efficient."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "BKGrit KB Bot"
          git config user.email "kb-bot@bkgrit.com"
          git add kb/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "KB auto-update: $(date +%Y-%m-%d)

          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            git push
          fi

      - name: Trigger Vercel deploy
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -s -X POST "$DEPLOY_HOOK"
            echo "Deploy triggered"
          else
            echo "No deploy hook configured, skipping"
          fi
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
